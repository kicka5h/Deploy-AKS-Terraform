name: "Terraform Validate"
run-name: "PR Terraform Validate (${{ github.head_ref }})"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-validate.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  # -------------------------------------------------------
  # Detect which environments have changes
  # -------------------------------------------------------
  detect-changes:
    name: Detect Changed Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.filter.outputs.environments }}
      shared_changed: ${{ steps.filter.outputs.shared_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed environments
        id: filter
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- terraform/)

          # Check if shared terraform files changed (anything outside env/)
          SHARED_CHANGED="false"
          if echo "$CHANGED_FILES" | grep -qvE '^terraform/env/'; then
            SHARED_CHANGED="true"
          fi
          echo "shared_changed=$SHARED_CHANGED" >> "$GITHUB_OUTPUT"

          # Build list of affected environments
          ENVS=()

          # If shared files changed, all environments are affected
          if [ "$SHARED_CHANGED" = "true" ]; then
            for f in terraform/env/*.tfvars; do
              ENV_NAME=$(basename "$f" .tfvars)
              ENVS+=("$ENV_NAME")
            done
          else
            # Only environments whose tfvars changed
            for f in $(echo "$CHANGED_FILES" | grep '^terraform/env/' || true); do
              ENV_NAME=$(basename "$f" .tfvars)
              ENVS+=("$ENV_NAME")
            done
          fi

          # Deduplicate and build JSON array
          UNIQUE_ENVS=$(printf '%s\n' "${ENVS[@]}" | sort -u | jq -R . | jq -sc .)
          echo "environments=$UNIQUE_ENVS" >> "$GITHUB_OUTPUT"
          echo "Affected environments: $UNIQUE_ENVS"

  # -------------------------------------------------------
  # Validate, Plan & Pre-flight Checks
  # -------------------------------------------------------
  validate:
    name: "Validate (${{ matrix.environment }})"
    needs: detect-changes
    if: needs.detect-changes.outputs.environments != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.detect-changes.outputs.environments) }}
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: terraform
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Git Config
        run: git config --global url."https://oauth2:${{ secrets.PAT }}@github.com".insteadOf https://github.com

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        id: init
        run: |
          terraform init -input=false \
            -backend-config="key=${{ matrix.environment }}.tfstate" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="subscription_id=${{ secrets.TF_STATE_SUBSCRIPTION_ID }}"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="env/${{ matrix.environment }}.tfvars" \
            -lock=false \
            -input=false \
            -no-color \
            -out="${{ matrix.environment }}.tfplan" 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Extract Resource Counts
        id: resource_counts
        if: steps.plan.outcome == 'success'
        run: |
          PLAN_TEXT=$(cat plan_output.txt)
          ADD=$(echo "$PLAN_TEXT" | grep -oP '\d+(?= to add)' || echo "0")
          CHANGE=$(echo "$PLAN_TEXT" | grep -oP '\d+(?= to change)' || echo "0")
          DESTROY=$(echo "$PLAN_TEXT" | grep -oP '\d+(?= to destroy)' || echo "0")
          echo "add=$ADD" >> "$GITHUB_OUTPUT"
          echo "change=$CHANGE" >> "$GITHUB_OUTPUT"
          echo "destroy=$DESTROY" >> "$GITHUB_OUTPUT"

      # --- Pre-flight: export plan to JSON for analysis ---
      - name: Export Plan JSON
        id: plan_json
        if: steps.plan.outcome == 'success'
        run: terraform show -json "${{ matrix.environment }}.tfplan" > plan.json

      # --- tfsec: Security scanning ---
      - name: Run tfsec
        id: tfsec
        if: steps.plan.outcome == 'success'
        continue-on-error: true
        run: |
          # Install tfsec
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

          # Run against plan JSON for accurate results (evaluates actual values, not just HCL)
          tfsec . \
            --format json \
            --out tfsec_results.json \
            --tfvars-file "env/${{ matrix.environment }}.tfvars" \
            --no-color \
            --soft-fail 2>&1 | tee tfsec_output.txt

          # Generate summary
          CRITICAL=$(jq '[.results[]? | select(.severity == "CRITICAL")] | length' tfsec_results.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.results[]? | select(.severity == "HIGH")] | length' tfsec_results.json 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.results[]? | select(.severity == "MEDIUM")] | length' tfsec_results.json 2>/dev/null || echo "0")
          LOW=$(jq '[.results[]? | select(.severity == "LOW")] | length' tfsec_results.json 2>/dev/null || echo "0")
          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "medium=$MEDIUM" >> "$GITHUB_OUTPUT"
          echo "low=$LOW" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Build markdown findings report
          {
            echo "### tfsec Security Scan"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| Critical | $CRITICAL |"
            echo "| High | $HIGH |"
            echo "| Medium | $MEDIUM |"
            echo "| Low | $LOW |"
            echo "| **Total** | **$TOTAL** |"
            echo ""

            if [ "$TOTAL" -gt 0 ]; then
              echo "#### Findings"
              echo ""
              jq -r '.results[]? | "- **[\(.severity)]** \(.rule_description) (\(.rule_id))\n  - File: `\(.location.filename):\(.location.start_line)`\n  - [Details](\(.links[0] // "N/A"))\n"' \
                tfsec_results.json 2>/dev/null || echo "Could not parse findings"
            else
              echo "No security issues found."
            fi
          } > tfsec_report.md

          echo "report<<TFSEC_EOF" >> "$GITHUB_OUTPUT"
          cat tfsec_report.md >> "$GITHUB_OUTPUT"
          echo "TFSEC_EOF" >> "$GITHUB_OUTPUT"

          # Fail if critical or high findings
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::tfsec found $CRITICAL critical and $HIGH high severity issues"
            exit 1
          fi

      # --- Infracost: Cost estimation ---
      - name: Setup Infracost
        if: steps.plan.outcome == 'success'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run Infracost
        id: infracost
        if: steps.plan.outcome == 'success'
        continue-on-error: true
        run: |
          # Generate cost breakdown from the plan JSON
          infracost breakdown \
            --path plan.json \
            --format json \
            --out-file infracost_results.json 2>&1 | tee infracost_output.txt

          # Extract cost summary
          MONTHLY_COST=$(jq -r '.totalMonthlyCost // "0"' infracost_results.json 2>/dev/null || echo "0")
          PREV_MONTHLY_COST=$(jq -r '.pastTotalMonthlyCost // "0"' infracost_results.json 2>/dev/null || echo "0")
          DIFF_COST=$(jq -r '.diffTotalMonthlyCost // "0"' infracost_results.json 2>/dev/null || echo "0")

          echo "monthly_cost=$MONTHLY_COST" >> "$GITHUB_OUTPUT"
          echo "prev_cost=$PREV_MONTHLY_COST" >> "$GITHUB_OUTPUT"
          echo "diff_cost=$DIFF_COST" >> "$GITHUB_OUTPUT"

          # Generate human-readable output
          infracost output \
            --path infracost_results.json \
            --format table \
            --out-file infracost_table.txt 2>/dev/null || true

          # Build markdown report
          {
            echo "### Infracost Estimate"
            echo ""
            echo "| Metric | Monthly Cost |"
            echo "|--------|-------------|"
            echo "| Previous | \$$PREV_MONTHLY_COST |"
            echo "| New | \$$MONTHLY_COST |"
            echo "| Difference | \$$DIFF_COST |"
            echo ""
            echo '```'
            cat infracost_table.txt 2>/dev/null || echo "Detailed breakdown unavailable"
            echo '```'
          } > infracost_report.md

          echo "report<<COST_EOF" >> "$GITHUB_OUTPUT"
          cat infracost_report.md >> "$GITHUB_OUTPUT"
          echo "COST_EOF" >> "$GITHUB_OUTPUT"

      # --- Pre-flight: Azure login for quota queries ---
      - name: Azure Login
        if: steps.plan.outcome == 'success'
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      # --- Pre-flight: Quota & Capacity Validation ---
      - name: Pre-flight Quota & Capacity Check
        id: preflight
        if: steps.plan.outcome == 'success'
        continue-on-error: true
        run: |
          bash ../scripts/preflight-quota-check.sh \
            plan.json \
            "env/${{ matrix.environment }}.tfvars" \
            quota_report.md

          echo "report<<QUOTA_EOF" >> "$GITHUB_OUTPUT"
          cat quota_report.md >> "$GITHUB_OUTPUT"
          echo "QUOTA_EOF" >> "$GITHUB_OUTPUT"

      # --- Post PR Comment ---
      - name: Post PR Comment
        uses: actions/github-script@v7
        if: always()
        env:
          VALIDATION: ${{ steps.validate.outputs.stdout }}
          QUOTA_REPORT: ${{ steps.preflight.outputs.report }}
          TFSEC_REPORT: ${{ steps.tfsec.outputs.report }}
          INFRACOST_REPORT: ${{ steps.infracost.outputs.report }}
          TFSEC_CRITICAL: ${{ steps.tfsec.outputs.critical }}
          TFSEC_HIGH: ${{ steps.tfsec.outputs.high }}
          TFSEC_TOTAL: ${{ steps.tfsec.outputs.total }}
          MONTHLY_COST: ${{ steps.infracost.outputs.monthly_cost }}
          DIFF_COST: ${{ steps.infracost.outputs.diff_cost }}
          ADD: ${{ steps.resource_counts.outputs.add }}
          CHANGE: ${{ steps.resource_counts.outputs.change }}
          DESTROY: ${{ steps.resource_counts.outputs.destroy }}
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const fs = require('fs');
            const env = '${{ matrix.environment }}';
            const marker = `<!-- tf-validate-${env} -->`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const planOutcome = '${{ steps.plan.outcome }}';
            const preflightOutcome = '${{ steps.preflight.outcome }}';
            const tfsecOutcome = '${{ steps.tfsec.outcome }}';
            const infracostOutcome = '${{ steps.infracost.outcome }}';
            const allPassed = planOutcome === 'success' &&
                              preflightOutcome === 'success' &&
                              tfsecOutcome === 'success';
            const statusIcon = allPassed ? '✅' : '❌';
            const destroyCount = parseInt(process.env.DESTROY || '0');
            const destroyWarn = destroyCount > 0 ? `\n> ⚠️ **${destroyCount} resource(s) will be destroyed**` : '';

            // Security warning
            const tfsecCritical = parseInt(process.env.TFSEC_CRITICAL || '0');
            const tfsecHigh = parseInt(process.env.TFSEC_HIGH || '0');
            const secWarn = (tfsecCritical > 0 || tfsecHigh > 0)
              ? `\n> 🔴 **${tfsecCritical} critical, ${tfsecHigh} high severity security findings — must be resolved**`
              : '';

            // Cost summary
            const monthlyCost = process.env.MONTHLY_COST || '-';
            const diffCost = process.env.DIFF_COST || '0';
            const costNote = parseFloat(diffCost) > 0
              ? `\n> 💰 **Estimated cost increase: +$${diffCost}/month**`
              : '';

            // Read plan output from file
            let planText = 'N/A';
            try {
              planText = fs.readFileSync('terraform/plan_output.txt', 'utf8');
              if (planText.length > 40000) {
                planText = planText.substring(0, 40000) + '\n... (truncated)';
              }
            } catch (e) { /* ignore */ }

            const output = `${marker}
            ## ${statusIcon} Terraform Validation: \`${env}\`

            | Step | Status |
            |------|--------|
            | Format | \`${{ steps.fmt.outcome }}\` |
            | Init | \`${{ steps.init.outcome }}\` |
            | Validate | \`${{ steps.validate.outcome }}\` |
            | Plan | \`${{ steps.plan.outcome }}\` |
            | Security Scan (tfsec) | \`${{ steps.tfsec.outcome }}\` |
            | Cost Estimate (Infracost) | \`${{ steps.infracost.outcome }}\` |
            | Pre-flight Quota Check | \`${{ steps.preflight.outcome }}\` |

            ### Resource Changes
            | Add | Change | Destroy | Est. Monthly Cost |
            |-----|--------|---------|-------------------|
            | ${process.env.ADD || '-'} | ${process.env.CHANGE || '-'} | ${process.env.DESTROY || '-'} | $${monthlyCost} |
            ${destroyWarn}${secWarn}${costNote}

            <details><summary>Validation Output</summary>

            \`\`\`
            ${process.env.VALIDATION || 'N/A'}
            \`\`\`

            </details>

            <details><summary>Plan Output</summary>

            \`\`\`
            ${planText}
            \`\`\`

            </details>

            <details><summary>Security Scan Report (tfsec)</summary>

            ${process.env.TFSEC_REPORT || 'Security scan was skipped or unavailable'}

            </details>

            <details><summary>Cost Estimate (Infracost)</summary>

            ${process.env.INFRACOST_REPORT || 'Cost estimate was skipped or unavailable'}

            </details>

            <details><summary>Pre-flight Quota & Capacity Report</summary>

            ${process.env.QUOTA_REPORT || 'Pre-flight check was skipped or unavailable'}

            </details>

            *Triggered by: @${{ github.actor }} | Workflow: \`${{ github.workflow }}\`*`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            }
